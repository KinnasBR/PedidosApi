trigger:
  branches:
    include:
      - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.x'

steps:
- task: UseDotNet@2
  displayName: '1. Instalar .NET SDK $(dotnetVersion)'
  inputs:
    packageType: 'sdk'
    version: '$(dotnetVersion)'
    includePreviewVersions: true  # ✅ necessário para .NET 10

- task: DotNetCoreCLI@2
  displayName: '2. Restaurar pacotes NuGet'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'

- task: DotNetCoreCLI@2
  displayName: '3. Build do projeto'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: '4. Executar testes unitários'
  inputs:
    command: 'test'
    projects: '**/*Tests*.csproj'
    arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"'
    publishTestResults: true

- task: DotNetCoreCLI@2
  displayName: '5. Publicar artefato'
  inputs:
    command: 'publish'
    projects: '**/PedidosApi.csproj'  # ✅ apenas o projeto principal
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-build'
    zipAfterPublish: true

- task: PublishBuildArtifacts@1
  displayName: '6. Salvar artefato no Azure DevOps'
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'
    publishLocation: 'Container'